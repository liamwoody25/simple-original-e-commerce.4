<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cascadia+Mono:ital,wght@0,200..700;1,200..700&family=Nunito:ital,wght@0,200..1000;1,200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./public/css/main.css">
  <title>Tektronics Project</title>
</head>
<body>
  <div class="container">

  <!---- shopping section slide in ---->
    <div class="shopping-section">
      <div class="cart-content">
      </div>
      <div class="bag-price-container"></div>
    </div>

  <!---- header section ---->
    <header>
      <h1>Tektronics</h1>
      <button aria-label="bag-btn" class="bag-btn">
        <i class="bi bi-bag"></i>
        <span class="input" id="bag-output">0</span>
      </button>
    </header>
  <!---- header section ---->



  <!---- product-cards ---->
    <div class="product-cards">



    <!--- product-card-1 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/pexels-dlxmedia-hu-maccbook.png" alt="image of laptop">
          <div class="card-text-content">
            <h3>Macbook</h3>
            <p>$899</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Macbook" data-price="899">Add To Bag</button>
          </div>
        </div>
      </article>
     <!--- product-card-1 --->



    <!--- product-card-2 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/andrey-matveev-msartwatch-unsplash.png" alt="image of smartwatch">
          <div class="card-text-content">
            <h3>Android</h3>
            <p>$399</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Android" data-price="399">Add To Bag</button>
          </div>
        </div>
      </article>
    <!--- product-card-2 --->


    
    <!--- product-card-3 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/amanz-FT-iphone-unsplash.png" alt="image of smartphone">
          <div class="card-text-content">
            <h3>Iphone</h3>
            <p>$699</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Iphone" data-price="699">Add To Bag</button>
          </div>
        </div>
      </article>
    <!--- product-card-3 --->



    <!--- product-card-4 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/pexels-cottonbro-headphones-jpg.jpg" alt="image of headphones">
          <div class="card-text-content">
            <h3>Headset</h3>
            <p>$250</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Headset" data-price="250">Add To Bag</button>
          </div>
        </div>
      </article>
    <!--- product-card-4 --->



    <!--- product-card-5 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/pexels-joshsorenson-tablet.png" alt="image of tablet">
          <div class="card-text-content">
            <h3>Ipad</h3>
            <p>$499</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Ipad" data-price="499">Add To Bag</button>
          </div>
        </div>
      </article>
    <!--- product-card-5 --->



    <!--- product-card-6 --->
      <article class="product-card">
        <div class="product-card-content">
            <img class="card-image" src="./public/assets/images/andrew-hutchings-camera-unsplash.png" alt="image of camera">
          <div class="card-text-content">
            <h3>Canon</h3>
            <p>$800</p>
          </div>
          <div class="btn-content">
            <button aria-label="item-btn" class="item-btn" data-name="Canon" data-price="800">Add To Bag</button>
          </div>
        </div>
      </article>


    
    </div>

    </div>
  <script src="./public/js/bag.js"></script>
</body>
</html>
